<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#3498db">
    <title>小学生习字工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .input-group label {
            font-size: 1.1rem;
            color: #34495e;
        }
        
        #charInput {
            width: 80px;
            height: 50px;
            font-size: 2rem;
            text-align: center;
            border: 2px solid #3498db;
            border-radius: 10px;
            outline: none;
            font-family: 'KaiTi', '楷体', cursive;
        }
        
        #charInput:focus {
            border-color: #2980b9;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }
        
        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #27ae60, #1e8449);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
        }
        
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }
        
        .btn-info {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }
        
        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
        }
        
        .canvas-container {
            position: relative;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        canvas {
            border: 3px solid #2c3e50;
            border-radius: 8px;
            cursor: crosshair;
            touch-action: none;
        }
        
        .instructions {
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 10px;
            border-left: 4px solid #3498db;
            max-width: 600px;
            text-align: left;
        }
        
        .instructions h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .instructions ul {
            color: #555;
            line-height: 1.8;
            padding-left: 20px;
        }
        
        .color-picker {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .color-picker label {
            font-size: 1.1rem;
            color: #34495e;
        }
        
        #brushColor {
            width: 50px;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .brush-size {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brush-size label {
            font-size: 1.1rem;
            color: #34495e;
        }
        
        #brushSize {
            width: 100px;
            cursor: pointer;
        }
        
        .size-preview {
            width: 20px;
            height: 20px;
            background: #333;
            border-radius: 50%;
            display: inline-block;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            
            h1 {
                font-size: 1.2rem;
                margin-bottom: 8px;
            }
            
            .controls {
                gap: 6px;
                margin-bottom: 8px;
            }
            
            button {
                padding: 10px 8px;
                font-size: 0.8rem;
                min-height: 44px;
                min-width: 44px;
            }
            
            #charInput {
                width: 50px;
                height: 40px;
                font-size: 1.5rem;
            }
            
            .canvas-container {
                padding: 8px;
            }
            
            canvas {
                width: 280px !important;
                height: 280px !important;
            }
            
            .color-picker, .brush-size {
                flex: 1 1 auto;
                min-width: 45%;
            }
            
            .color-picker label,
            .brush-size label {
                font-size: 0.85rem;
                white-space: nowrap;
            }
            
            #brushSize {
                width: 60px;
            }
            
            .instructions {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
            
            .instructions ul {
                padding-left: 15px;
            }
        }
        
        @media (max-width: 360px) {
            canvas {
                width: 260px;
                height: 260px;
            }
            
            button {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <h1>📝 小学生习字工具</h1>
    
    <div class="controls">
        <button class="btn-info" onclick="randomChar()">随机生字</button>
        <button class="btn-primary" onclick="randomDrawing()">简笔画</button>
        <input type="text" id="charInput" maxlength="1" placeholder="字">
        <button class="btn-warning" onclick="clearCanvas()">清除重写</button>
        <button class="btn-danger" onclick="undo()">撤销</button>
    </div>
    
    <div class="controls">
        <div class="color-picker">
            <label for="brushColor">画笔颜色：</label>
            <input type="color" id="brushColor" value="#2c3e50">
        </div>
        <div class="brush-size">
            <label for="brushSize">笔画粗细：</label>
            <input type="range" id="brushSize" min="5" max="30" value="15">
            <span class="size-preview" id="sizePreview"></span>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="writingCanvas" width="400" height="400"></canvas>
    </div>
    
    <div class="instructions">
        <h3>使用说明：</h3>
        <ul>
            <li>点击"随机生字"按钮随机生成一个汉字练习</li>
            <li>也可以在输入框中输入汉字后按回车键</li>
            <li>在田字格中书写汉字，可以用鼠标或手指（触屏设备）</li>
            <li>点击"清除重写"只清除书写内容，保留描红字</li>
            <li>点击"撤销"可以撤销上一步书写</li>
            <li>可以调整画笔颜色和粗细</li>
        </ul>
    </div>

    <script>
        const canvas = document.getElementById('writingCanvas');
        const ctx = canvas.getContext('2d');
        const charInput = document.getElementById('charInput');
        const brushColor = document.getElementById('brushColor');
        const brushSize = document.getElementById('brushSize');
        const sizePreview = document.getElementById('sizePreview');
        
        const commonChars = '一二三四五六七八九十人口手大小多少日月水火山石田土木天地上下左右中男女日月明早晚云雨雪风花草木鸟鱼虫天地日月山水火木金土人口手足耳目头心天地大小多少上下左右前后高低长短远近多少东西南北中国人民共产党红五星红旗天安门天安门广场五星红旗高高飘扬我爱祖国我爱中国共产党我爱中国人民解放军我爱中国人民';

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentChar = '';
        let currentMode = 'char';
        let currentDrawing = '';
        let history = [];
        let historyStep = -1;
        
        const drawings = {
            sun: function() {
                ctx.beginPath();
                ctx.arc(200, 120, 40, 0, Math.PI * 2);
                ctx.stroke();
                for (let i = 0; i < 8; i++) {
                    const angle = (i * Math.PI) / 4;
                    ctx.moveTo(200 + Math.cos(angle) * 55, 120 + Math.sin(angle) * 55);
                    ctx.lineTo(200 + Math.cos(angle) * 80, 120 + Math.sin(angle) * 80);
                }
                ctx.stroke();
            },
            tree: function() {
                ctx.beginPath();
                ctx.moveTo(200, 350);
                ctx.lineTo(200, 200);
                ctx.moveTo(200, 250);
                ctx.lineTo(150, 200);
                ctx.moveTo(200, 250);
                ctx.lineTo(250, 200);
                ctx.moveTo(200, 200);
                ctx.lineTo(130, 150);
                ctx.moveTo(200, 200);
                ctx.lineTo(270, 150);
                ctx.moveTo(200, 180);
                ctx.lineTo(150, 120);
                ctx.moveTo(200, 180);
                ctx.lineTo(250, 120);
                ctx.stroke();
            },
            house: function() {
                ctx.beginPath();
                ctx.moveTo(100, 280);
                ctx.lineTo(200, 180);
                ctx.lineTo(300, 280);
                ctx.closePath();
                ctx.moveTo(130, 280);
                ctx.lineTo(130, 350);
                ctx.lineTo(270, 350);
                ctx.lineTo(270, 280);
                ctx.moveTo(180, 280);
                ctx.lineTo(180, 350);
                ctx.moveTo(180, 315);
                ctx.lineTo(220, 315);
                ctx.moveTo(220, 280);
                ctx.lineTo(220, 350);
                ctx.stroke();
            },
            flower: function() {
                ctx.beginPath();
                ctx.moveTo(200, 350);
                ctx.lineTo(200, 250);
                ctx.moveTo(180, 280);
                ctx.lineTo(220, 280);
                ctx.moveTo(200, 200);
                ctx.arc(200, 180, 30, 0, Math.PI * 2);
                ctx.moveTo(200, 180);
                ctx.arc(170, 160, 20, 0, Math.PI * 2);
                ctx.moveTo(200, 180);
                ctx.arc(230, 160, 20, 0, Math.PI * 2);
                ctx.moveTo(200, 180);
                ctx.arc(170, 200, 20, 0, Math.PI * 2);
                ctx.moveTo(200, 180);
                ctx.arc(230, 200, 20, 0, Math.PI * 2);
                ctx.stroke();
            },
            fish: function() {
                ctx.beginPath();
                ctx.moveTo(100, 200);
                ctx.quadraticCurveTo(150, 150, 200, 200);
                ctx.quadraticCurveTo(250, 250, 300, 200);
                ctx.quadraticCurveTo(350, 200, 380, 180);
                ctx.lineTo(350, 200);
                ctx.quadraticCurveTo(350, 220, 380, 220);
                ctx.lineTo(300, 200);
                ctx.moveTo(180, 200);
                ctx.arc(170, 200, 10, 0, Math.PI * 2);
                ctx.moveTo(220, 200);
                ctx.lineTo(250, 180);
                ctx.moveTo(220, 200);
                ctx.lineTo(250, 220);
                ctx.stroke();
            },
            bird: function() {
                ctx.beginPath();
                ctx.moveTo(100, 200);
                ctx.quadraticCurveTo(150, 150, 200, 180);
                ctx.quadraticCurveTo(250, 150, 300, 200);
                ctx.moveTo(200, 180);
                ctx.arc(200, 175, 15, 0, Math.PI * 2);
                ctx.moveTo(205, 172);
                ctx.arc(205, 170, 3, 0, Math.PI * 2);
                ctx.moveTo(130, 190);
                ctx.lineTo(110, 170);
                ctx.moveTo(130, 190);
                ctx.lineTo(110, 210);
                ctx.stroke();
            },
            cat: function() {
                ctx.beginPath();
                ctx.arc(200, 250, 60, 0, Math.PI * 2);
                ctx.moveTo(140, 250);
                ctx.arc(140, 250, 20, 0, Math.PI * 2);
                ctx.moveTo(260, 250);
                ctx.arc(260, 250, 20, 0, Math.PI * 2);
                ctx.moveTo(180, 240);
                ctx.arc(180, 240, 8, 0, Math.PI * 2);
                ctx.moveTo(220, 240);
                ctx.arc(220, 240, 8, 0, Math.PI * 2);
                ctx.moveTo(190, 265);
                ctx.arc(190, 265, 5, 0, Math.PI * 2);
                ctx.moveTo(210, 265);
                ctx.arc(210, 265, 5, 0, Math.PI * 2);
                ctx.moveTo(180, 280);
                ctx.lineTo(170, 290);
                ctx.moveTo(220, 280);
                ctx.lineTo(230, 290);
                ctx.stroke();
            },
            boat: function() {
                ctx.beginPath();
                ctx.moveTo(100, 250);
                ctx.quadraticCurveTo(200, 350, 300, 250);
                ctx.lineTo(280, 250);
                ctx.lineTo(280, 180);
                ctx.lineTo(120, 180);
                ctx.lineTo(120, 250);
                ctx.moveTo(200, 180);
                ctx.lineTo(200, 100);
                ctx.quadraticCurveTo(200, 80, 250, 80);
                ctx.stroke();
            },
            star: function() {
                ctx.beginPath();
                const cx = 200, cy = 200, outerR = 80, innerR = 30;
                for (let i = 0; i < 10; i++) {
                    const r = (i % 2 === 0) ? outerR : innerR;
                    const angle = (i * Math.PI) / 5 - Math.PI / 2;
                    if (i === 0) ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
                    else ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
                }
                ctx.closePath();
                ctx.stroke();
            },
            heart: function() {
                ctx.beginPath();
                ctx.moveTo(200, 320);
                ctx.bezierCurveTo(200, 280, 120, 280, 120, 200);
                ctx.bezierCurveTo(120, 120, 280, 120, 280, 200);
                ctx.bezierCurveTo(280, 280, 200, 280, 200, 320);
                ctx.stroke();
            }
        };
        
        function init() {
            drawGrid();
            updateSizePreview();
        }
        
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            
            const cellSize = canvas.width / 2;
            
            ctx.beginPath();
            ctx.moveTo(0, cellSize);
            ctx.lineTo(canvas.width, cellSize);
            ctx.moveTo(cellSize, 0);
            ctx.lineTo(cellSize, canvas.height);
            ctx.stroke();
            
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            if (currentChar) {
                ctx.font = '300px KaiTi, 楷体, STKaiti';
                ctx.fillStyle = 'rgba(231, 76, 60, 0.2)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(currentChar, canvas.width / 2, canvas.height / 2 + 20);
            }
        }
        
        function showChar() {
            const char = charInput.value.trim();
            if (char.length === 0) {
                alert('请输入一个汉字！');
                return;
            }
            currentChar = char[0];
            saveState();
            drawGrid();
        }
        
        function randomChar() {
            const idx = Math.floor(Math.random() * commonChars.length);
            currentChar = commonChars[idx];
            charInput.value = currentChar;
            currentMode = 'char';
            drawGrid();
        }
        
        function randomDrawing() {
            const keys = Object.keys(drawings);
            const key = keys[Math.floor(Math.random() * keys.length)];
            currentMode = 'drawing';
            currentDrawing = key;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(231, 76, 60, 0.3)';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            drawings[key]();
        }
        
        function toggleTrace() {
            showTrace = !showTrace;
            drawGrid();
            restoreStroke();
        }
        
        function clearCanvas() {
            if (currentMode === 'drawing' && currentDrawing) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = 'rgba(231, 76, 60, 0.3)';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                drawings[currentDrawing]();
            } else {
                drawGrid();
            }
            history = [];
            historyStep = -1;
        }
        
        function saveState() {
            history = history.slice(0, historyStep + 1);
            history.push(canvas.toDataURL());
            historyStep++;
            if (history.length > 20) {
                history.shift();
                historyStep--;
            }
        }
        
        function undo() {
            if (historyStep > 0) {
                historyStep--;
                restoreStroke();
            } else if (historyStep === 0) {
                historyStep = -1;
                drawGrid();
            }
        }
        
        function restoreStroke() {
            if (historyStep >= 0 && history[historyStep]) {
                const img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = history[historyStep];
            } else {
                drawGrid();
            }
        }
        
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }
        
        function startDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
        }
        
        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const pos = getPos(e);
            
            ctx.strokeStyle = brushColor.value;
            ctx.lineWidth = parseInt(brushSize.value);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            
            lastX = pos.x;
            lastY = pos.y;
        }
        
        function stopDrawing(e) {
            if (isDrawing) {
                isDrawing = false;
                saveState();
            }
        }
        
        function updateSizePreview() {
            sizePreview.style.width = brushSize.value + 'px';
            sizePreview.style.height = brushSize.value + 'px';
        }
        
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);
        
        brushSize.addEventListener('input', updateSizePreview);
        
        charInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                showChar();
            }
        });
        
        init();
    </script>
</body>
</html>
